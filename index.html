<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>KBO 경기·예매 일정</title>
  <style>
    :root{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#172033;background:#f4f7fb}
    *{box-sizing:border-box}body{margin:0}.wrap{max-width:1200px;margin:auto;padding:24px}
    header{background:linear-gradient(135deg,#142b55,#2462a8);color:white;padding:28px;border-radius:22px;box-shadow:0 14px 35px #17345b2b}
    h1{margin:0 0 8px;font-size:clamp(26px,4vw,42px)}header p{margin:0;opacity:.9}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}
    button,select{border:1px solid #d7deea;background:white;padding:11px 14px;border-radius:12px;font-size:15px}
    button{cursor:pointer;font-weight:700}.primary{background:#1768c4;color:white;border-color:#1768c4}
    .meta{margin:10px 2px;color:#56647a;font-size:14px}
    .status{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .badge{background:white;border:1px solid #dce3ee;border-radius:999px;padding:7px 11px;font-size:13px}
    .tablebox{overflow:auto;background:white;border-radius:18px;box-shadow:0 8px 24px #17203312}
    table{width:100%;border-collapse:collapse;min-width:980px}
    th,td{padding:13px 12px;border-bottom:1px solid #edf0f5;text-align:left;white-space:nowrap}
    th{position:sticky;top:0;background:#eef4fb;font-size:13px;color:#40506a}
    tr:hover td{background:#fafcff}.site{font-weight:800}.nol{color:#7a3df0}.tl{color:#1768c4}
    .empty{text-align:center;padding:50px;color:#78869a}a{color:#1768c4;font-weight:700;text-decoration:none}
    .error{color:#b42318}
    .state{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}
    .state-open{background:#e8f7ee;color:#137a3d}
    .state-wait{background:#fff4d6;color:#9a6200}
    .state-sold{background:#ffe7e7;color:#b42318}
    .state-end{background:#e9edf3;color:#526174}
    .state-check{background:#eee9ff;color:#6541c1}
    @media(max-width:640px){.wrap{padding:12px}header{padding:22px 18px;border-radius:16px}}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚾ KBO 경기·예매 일정</h1>
    <p>KBO 10개 구단의 경기와 예매 상태를 한 화면에서 확인합니다.</p>
  </header>

  <div class="toolbar">
    <button class="primary" onclick="hardRefresh()">최신 정보 불러오기</button>

    <select id="teamFilter" onchange="render()">
      <option value="">전체 구단</option>
    </select>

    <select id="siteFilter" onchange="render()">
      <option value="">전체 예매처</option>
      <option value="티켓링크">티켓링크</option>
      <option value="NOL 티켓">NOL 티켓</option>
    </select>

    <select id="bookingFilter" onchange="render()">
      <option value="">전체 예매상태</option>
      <option value="예매예정">예매예정</option>
      <option value="예매중">예매중</option>
      <option value="매진">매진</option>
      <option value="예매종료">예매종료</option>
      <option value="확인 필요">확인 필요</option>
    </select>

    <select id="monthFilter" onchange="render()">
      <option value="">전체 월</option>
    </select>
  </div>

  <div id="meta" class="meta">데이터 확인 중…</div>
  <div id="status" class="status"></div>

  <div class="tablebox">
    <table>
      <thead>
        <tr>
          <th>예매처</th><th>경기일</th><th>시간</th><th>대진</th>
          <th>구장</th><th>예매 시작</th><th>예매 상태</th><th>바로가기</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="8" class="empty">경기정보를 불러오는 중입니다.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const ALL_TEAMS = [
  "KIA 타이거즈",
  "KT 위즈",
  "LG 트윈스",
  "NC 다이노스",
  "SSG 랜더스",
  "두산 베어스",
  "롯데 자이언츠",
  "삼성 라이온즈",
  "키움 히어로즈",
  "한화 이글스"
];

function loadFreshData(){
  const script=document.createElement("script");
  script.src="./data.js?v="+Date.now();
  script.onload=init;
  script.onerror=()=>{
    document.getElementById("rows").innerHTML=
      '<tr><td colspan="8" class="empty error">data.js를 불러오지 못했습니다.</td></tr>';
  };
  document.head.appendChild(script);
}

function hardRefresh(){
  location.href=location.pathname+"?refresh="+Date.now();
}

function esc(value){
  return String(value??"").replace(/[&<>"']/g,char=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[char]));
}

function normalizeTeam(value){
  const text=String(value||"").replace(/\s+/g,"").toUpperCase();

  const aliases = {
    "KIA":"KIA타이거즈",
    "기아":"KIA타이거즈",
    "KT":"KT위즈",
    "LG":"LG트윈스",
    "NC":"NC다이노스",
    "SSG":"SSG랜더스",
    "두산":"두산베어스",
    "롯데":"롯데자이언츠",
    "삼성":"삼성라이온즈",
    "키움":"키움히어로즈",
    "한화":"한화이글스"
  };

  for(const [key,result] of Object.entries(aliases)){
    if(text.includes(key.toUpperCase())) return result;
  }
  return text;
}

function eventHasTeam(event, selectedTeam){
  if(!selectedTeam) return true;

  const target = normalizeTeam(selectedTeam);
  const homeTeam = normalizeTeam(event.home);

  // 선택한 구단의 홈경기만 표시
  return homeTeam === target || homeTeam.includes(target);
}

function stateClass(status){
  if(status==="예매중") return "state-open";
  if(status==="예매예정") return "state-wait";
  if(status==="매진") return "state-sold";
  if(status==="예매종료") return "state-end";
  return "state-check";
}

function init(){
  const data=window.SPORTS_DATA||{events:[],sourceStatus:[]};

  teamFilter.innerHTML=
    '<option value="">전체 구단</option>'+
    ALL_TEAMS.map(team=>`<option value="${esc(team)}">${esc(team)}</option>`).join("");

  const months=[
    ...new Set(
      data.events.map(event=>(event.date||"").slice(0,7)).filter(Boolean)
    )
  ].sort();

  monthFilter.innerHTML=
    '<option value="">전체 월</option>'+
    months.map(month=>`<option value="${month}">${month}</option>`).join("");

  meta.textContent=
    `갱신 시각: ${data.updatedAt||"아직 갱신 전"} · 전체 ${data.events.length}경기`;

  status.innerHTML=(data.sourceStatus||[]).map(source=>
    `<span class="badge ${source.success?"":"error"}">`+
    `${esc(source.team)} ${source.success?esc(source.count)+"건":"실패"}</span>`
  ).join("");

  render();
}

function render(){
  const data=window.SPORTS_DATA||{events:[]};
  const team=teamFilter.value;
  const site=siteFilter.value;
  const booking=bookingFilter.value;
  const month=monthFilter.value;

  const list=data.events.filter(event=>
    eventHasTeam(event,team) &&
    (!site || event.site===site) &&
    (!booking || event.bookingStatus===booking) &&
    (!month || (event.date||"").startsWith(month))
  );

  rows.innerHTML=list.length
    ? list.map(event=>`<tr>
        <td class="site ${event.site==="NOL 티켓"?"nol":"tl"}">${esc(event.site)}</td>
        <td>${esc(event.date)}</td>
        <td>${esc(event.time)}</td>
        <td>${esc((event.away||"?")+" vs "+(event.home||"?"))}</td>
        <td>${esc(event.venue)}</td>
        <td>${esc(event.bookingOpen||"-")}</td>
        <td><span class="state ${stateClass(event.bookingStatus)}">${esc(event.bookingStatus||"확인 필요")}</span></td>
        <td><a href="${esc(event.link)}" target="_blank" rel="noopener">예매처 열기</a></td>
      </tr>`).join("")
    : '<tr><td colspan="8" class="empty">조건에 맞는 경기정보가 없습니다.</td></tr>';
}

loadFreshData();
</script>
</body>
</html>
